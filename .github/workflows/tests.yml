name: 單元測試

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝相依
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 執行 pytest（治理鐵則：全綠才可部署）
        run: python -m pytest tests/ -q
