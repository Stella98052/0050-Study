name: 前瞻更新監督（watchdog）

# 台北 21:10（UTC 13:10）——在 18:10/19:10 雙排程之後檢查；
# 本 workflow 亦受 GitHub 排程延遲影響，但當晚任何時間補查皆有效
on:
  schedule:
    # 台北 22:10（UTC 14:10）——在兩班實際落地時間（20:00–21:00）之後；
    # 判定為資料驅動（比對 TWSE 最新交易日），不看日曆今日
    - cron: "10 14 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write        # 補觸發 daily_update
  issues: write         # 開 Issue 通知

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 檢查前瞻紀錄是否落後官方交易日
        id: check
        run: python scripts/watchdog_check.py

      - name: 補觸發每日更新
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "今日無前瞻紀錄，補觸發 daily_update…"
          gh workflow run daily_update.yml --ref main
      - name: 開 Issue 通知
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "⏰ 每日前瞻更新未如期執行 $(date -u +%Y-%m-%d)" \
            --body "watchdog（資料驅動）：predictions 最新資料日=${{ steps.check.outputs.pred_latest }}，官方最新交易日=${{ steps.check.outputs.twse_latest }} → 落後，已自動補觸發 daily_update。判定以官方實際交易日為準，休市/連假不會誤報；若仍反覆出現，多為官方當日資料發布時間晚於排程，請檢視 daily_update 執行紀錄。"
