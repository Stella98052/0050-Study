name: 每日前瞻更新（收盤後）

on:
  schedule:
    # GitHub 排程不保證準時（實測延遲可達數小時，尤其整點），故：
    # ①錯開整點 ②雙時段互為備援（predictions 同日去重，第二次自動略過）
    # 排程時間經 predictions.csv run_ts 證實可行：實際落在台北 20:00–20:30
    # （GitHub 排程延遲 1–2h 屬平台特性），該時點官方已有當日資料。
    # 雙班備援；同日去重故重跑安全。
    - cron: "10 10 * * 1-5"     # 台北 18:10 = UTC 10:10
    - cron: "10 11 * * 1-5"     # 台北 19:10 = UTC 11:10（備援）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: 安裝系統套件（LightGBM 執行期需 libgomp1）
        run: sudo apt-get update && sudo apt-get install -y libgomp1
      - name: 安裝相依
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 若無模型包則先建置
        run: |
          if [ ! -f data/models/model_phase2-v1.joblib ]; then
            python run_phase2.py --holdings holdings.csv --skip-vg2 || echo "建置非零退出，續行"
          fi
      - name: 執行每日更新
        run: python daily_update.py --holdings holdings.csv || echo "更新非零退出，續行 commit"
      - name: Commit 前瞻紀錄與模型/快取（排除暫存）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只 add 需要的產物，絕不 add __pycache__/pyc（避免污染 repo）
          # L54：git add 多路徑時只要一個不存在即整條 fatal、什麼都不 stage
          # （曾造成 workflow 全綠但資料從未推回）。故逐檔存在才 add。
          for f in data/predictions.csv data/custom_snapshots.csv; do
            if [ -f "$f" ]; then git add -f "$f"; else echo "略過（不存在）：$f"; fi
          done
          for d in data/models data/reports data/raw; do
            if [ -d "$d" ]; then git add -f "$d"; else echo "略過（不存在）：$d"; fi
          done
          echo "--- 已 stage 檔案 ---"
          git diff --staged --name-only | head -20
          git reset -q -- '**/__pycache__' '**/*.pyc' 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "無變更，略過 commit"
          else
            git commit -m "chore: 每日前瞻更新 $(date -u +%Y-%m-%d)"
            git push
          fi
